<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }
        .text-wrap {
            font-size: 90px;
            font-family: Arial, Helvetica, sans-serif;
            color: #FFFFFF;
            background-color: #165DFF;
            padding: 30px 50px;
            text-align: center;
            transform-style: preserve-3d;
            animation: rotateSlow 10s linear infinite;
        }
        .cn-text {
            font-size: 50px;
            margin-top: 15px;
        }
        @keyframes rotateSlow {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="text-wrap">
        404 File Not Found
        <div class="cn-text">未找到指定文件</div>
    </div>
</body>
</html>
