<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #ffffff; /* 页面整体白底 */
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px; /* 3D透视景深 */
        }
        .text-wrap {
            font-size: 90px;
            font-family: Arial, Helvetica, sans-serif;
            color: #000000;
            background-color: #cccccc; /* 文字块灰色底色 */
            padding: 20px 40px;
            transform-style: preserve-3d; /* 保留3D空间 */
            animation: rotateSlow 12s linear infinite;
        }
        /* 沿纵轴Y轴完整360° 3D旋转 */
        @keyframes rotateSlow {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="text-wrap">404 Not Found</div>
</body>
</html>
