<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html lang="zh-CN">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>生日贺卡 完整版七页 兼容2018Edge</title>
<style type="text/css">
* {
    margin: 0;
    padding: 0;
    box-sizing: content-box;
}
body {
    background: #cccccc;
    padding: 40px;
}
.pdf-page {
    width: 595px;
    height: 842px;
    background: #ffffff;
    margin: 0 auto 30px auto;
    box-shadow: 0 0 15px #999999;
    position: relative;
    overflow: hidden;
}
/* ==========第一页 修复inset兼容 ========== */
.page1 .bg-layer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('https://djm.pages.dev/b/bg.png') no-repeat center center;
    background-size: cover;
    opacity: 0.6;
    z-index: 1;
}
.rotate-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 460px;
    height: 460px;
    margin-top: -230px;
    margin-left: -230px;
    z-index: 2;
    animation: antiRotate 3s linear infinite;
    -webkit-animation: antiRotate 3s linear infinite;
}
.word1 {
    font-size: 64px;
    font-weight: bold;
    font-style: italic;
    color: #e63946;
    text-shadow: 2px 2px 0 #ffd6a5;
    text-align: center;
    line-height: 90px;
}
.word2 {
    font-size: 60px;
    font-weight: bold;
    font-family: "KaiTi", serif;
    color: #457b9d;
    text-shadow: 2px 2px 0 #a8dadc;
    text-align: center;
    line-height: 90px;
}
.word3 {
    font-size: 66px;
    font-weight: 900;
    color: #2a9d8f;
    text-shadow: 3px 3px 0 #f4a261;
    text-align: center;
    line-height: 90px;
}
.word4 {
    font-size: 70px;
    font-weight: bold;
    font-style: oblique;
    color: #7209b7;
    text-shadow: 2px 2px 0 #f72585;
    text-align: center;
    line-height: 90px;
}
@keyframes antiRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(-360deg); }
}
@-webkit-keyframes antiRotate {
    0% { -webkit-transform: rotate(0deg); transform: rotate(0deg); }
    100% { -webkit-transform: rotate(-360deg); transform: rotate(-360deg); }
}
/* ==========第二页蛋糕页========== */
.cake-img {
    width: 90%;
    height: 90%;
    display: block;
    object-fit: cover;
    position: absolute;
    top: 50%;
    left: 50%;
    -webkit-transform: translate(-50%, -50%);
    transform: translate(-50%, -50%);
}
.cake-text {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "仿宋", "FangSong", serif;
    font-size: 24px;
    font-weight: bold;
    color: #BC1A45;
}
/* ==========第三页人像全屏图========== */
.page3-img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
}
/* ==========第四页：5秒渐变彩虹背景========== */
@keyframes bgRainbow {
    0%   { background-color: rgb(255, 0, 0); }
    10%  { background-color: rgb(255, 140, 0); }
    20%  { background-color: rgb(255, 255, 0); }
    30%  { background-color: rgb(0, 255, 0); }
    40%  { background-color: rgb(0, 255, 200); }
    50%  { background-color: rgb(0, 120, 255); }
    60%  { background-color: rgb(60, 0, 255); }
    70%  { background-color: rgb(180, 0, 255); }
    80%  { background-color: rgb(255, 0, 180); }
    90%  { background-color: rgb(255, 0, 80); }
    100% { background-color: rgb(255, 0, 0); }
}
@-webkit-keyframes bgRainbow {
    0%   { background-color: rgb(255, 0, 0); }
    10%  { background-color: rgb(255, 140, 0); }
    20%  { background-color: rgb(255, 255, 0); }
    30%  { background-color: rgb(0, 255, 0); }
    40%  { background-color: rgb(0, 255, 200); }
    50%  { background-color: rgb(0, 120, 255); }
    60%  { background-color: rgb(60, 0, 255); }
    70%  { background-color: rgb(180, 0, 255); }
    80%  { background-color: rgb(255, 0, 180); }
    90%  { background-color: rgb(255, 0, 80); }
    100% { background-color: rgb(255, 0, 0); }
}
.page4 {
    animation: bgRainbow 5s linear infinite;
    -webkit-animation: bgRainbow 5s linear infinite;
    display: -webkit-box;
    display: flex;
    -webkit-box-orient: vertical;
    flex-direction: column;
    -webkit-box-align: center;
    align-items: center;
    -webkit-box-pack: center;
    justify-content: center;
    gap: 120px;
}
.text-line1 {
    font-size: 92px;
    font-weight: 900;
    font-style: oblique;
    font-family: "黑体", sans-serif;
    background: linear-gradient(45deg, #fff, #ffff88, #ffffff);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow:
        3px 3px 0 #ff2266,
        6px 6px 0 #ffdd00,
        9px 9px 12px rgba(0,0,0,0.35);
    letter-spacing: 6px;
}
.text-line2 {
    font-size: 96px;
    font-weight: 900;
    font-family: "楷体", serif;
    background: linear-gradient(-45deg, #ffffff, #aaffff);
    -webkit-background-clip: text;
    color: transparent;
    text-shadow:
        3px 3px 0 #0099ff,
        6px 6px 0 #22ff99,
        9px 9px 12px rgba(0,0,0,0.35);
    letter-spacing: 8px;
}
/* ==========第五、第七页共用文本页面样式 修复inset ========== */
.text-page {
    position: relative;
}
.lotusBgMask {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('https://djm.pages.dev/b/lotus.png') no-repeat center center;
    background-size: cover;
    opacity: 0.3;
    z-index: 1;
}
.text-container {
    position: absolute;
    top: 40px;
    left: 40px;
    right: 40px;
    bottom: 40px;
    display: -webkit-box;
    display: flex;
    -webkit-box-align: center;
    align-items: center;
    -webkit-box-pack: center;
    justify-content: center;
    z-index: 2;
}
.text-content {
    white-space: pre-wrap;
    text-align: center;
    line-height: 2.2;
    font-family: "宋体", "SimSun", serif;
    color: #222;
    font-size: 20px;
    word-break: break-all;
}
.tip-text {
    font-size: 28px;
    color: #666;
    text-align: center;
}
.error-tip {
    color: #e63946;
}
/* ==========第六页：对比色跳跃切换========== */
@keyframes randomJump {
    0% {
        background-color: #ff0000;
        color: #ffffff;
    }
    25% {
        background-color: #ffff00;
        color: #000000;
    }
    50% {
        background-color: #0000ff;
        color: #ffffff;
    }
    75% {
        background-color: #ffa500;
        color: #000000;
    }
    100% {
        background-color: #ff0000;
        color: #ffffff;
    }
}
@-webkit-keyframes randomJump {
    0% {
        background-color: #ff0000;
        color: #ffffff;
    }
    25% {
        background-color: #ffff00;
        color: #000000;
    }
    50% {
        background-color: #0000ff;
        color: #ffffff;
    }
    75% {
        background-color: #ffa500;
        color: #000000;
    }
    100% {
        background-color: #ff0000;
        color: #ffffff;
    }
}
.page6 {
    animation: randomJump 0.2s step-end infinite;
    -webkit-animation: randomJump 0.2s step-end infinite;
    display: -webkit-box;
    display: flex;
    -webkit-box-orient: vertical;
    flex-direction: column;
    -webkit-box-align: center;
    align-items: center;
    -webkit-box-pack: center;
    justify-content: center;
    gap: 120px;
    font-size: 96px;
    font-weight: 900;
    font-family: "黑体", sans-serif;
}
/* 打印样式 */
@media print {
    body { background: #fff; padding: 0; }
    .pdf-page { box-shadow: none; margin: 0 0 20px 0; }
}
</style>
</head>
<body>
    <!-- 第一页 替换伪元素为独立div，修复老Edge背景失效 -->
    <div class="pdf-page page1">
        <div class="bg-layer"></div>
        <div class="rotate-wrap">
            <div class="word1">谭静怡，</div>
            <div class="word2">爷爷我</div>
            <div class="word3">祝你</div>
            <div class="word4">生日快乐！</div>
        </div>
    </div>

    <!-- 第二页 -->
    <div class="pdf-page">
        <img class="cake-img" src="https://djm.pages.dev/b/cake.png" alt="生日蛋糕">
        <div class="cake-text">送给你一个大大滴蛋糕（AI生成，好像有点毛病）</div>
    </div>

    <!-- 第三页 -->
    <div class="pdf-page">
        <img class="page3-img" src="https://djm.pages.dev/b/me.png" alt="人像">
    </div>

    <!-- 第四页 -->
    <div class="pdf-page page4">
        <div class="text-line1">别急啊，</div>
        <div class="text-line2">还有呢！</div>
    </div>

    <!-- 第五页 诗词页面 poem.txt -->
    <div class="pdf-page text-page" id="page5">
        <div class="lotusBgMask"></div>
        <div class="text-container">
            <div class="text-content tip-text" id="txt-poem">正在加载诗词内容...</div>
        </div>
    </div>

    <!-- 第六页 -->
    <div class="pdf-page page6">
        <div>怎么样，</div>
        <div>牛逼不？</div>
    </div>

    <!-- 第七页 翻译页面 trans.txt -->
    <div class="pdf-page text-page" id="page7">
        <div class="lotusBgMask"></div>
        <div class="text-container">
            <div class="text-content tip-text" id="txt-trans">正在加载白话翻译内容...</div>
        </div>
    </div>

<script type="text/javascript">
// 兼容老Edge图片预加载
function preloadImg(src, callback) {
    var img = new Image();
    img.onload = function(){ callback(); };
    img.onerror = function(){ console.log("图片加载失败："+src); };
    img.src = src;
}
// 通用自适应文字大小
function autoFit(el, wrap) {
    var wrapH = wrap.clientHeight;
    var wrapW = wrap.clientWidth;
    var fs = 16;
    el.style.fontSize = fs + "px";
    while (el.scrollHeight <= wrapH && el.scrollWidth <= wrapW && fs < 60) {
        fs++;
        el.style.fontSize = fs + "px";
    }
}
// 通用加载背景荷花图
function loadBg(maskDom) {
    preloadImg("https://djm.pages.dev/b/lotus.png", function(){
        maskDom.style.display = "block";
    });
}
// 加载文本通用函数
async function loadText(url, textEl, maskEl) {
    try {
        var res = await fetch(url);
        if (!res.ok) throw new Error("文件读取失败");
        var text = await res.text();
        textEl.className = "text-content";
        textEl.textContent = text;
        autoFit(textEl, textEl.closest(".text-container"));
        loadBg(maskEl);
    } catch (err) {
        textEl.className = "text-content error-tip";
        textEl.textContent = "网页解析失败，可能是不支持的网页类型，请检查网页或稍后重试";
        loadBg(maskEl);
    }
}
// 页面初始化
window.onload = function() {
    loadText(
        "https://djm.pages.dev/b/poem.txt",
        document.getElementById("txt-poem"),
        document.querySelector("#page5 .lotusBgMask")
    );
    loadText(
        "https://djm.pages.dev/b/trans.txt",
        document.getElementById("txt-trans"),
        document.querySelector("#page7 .lotusBgMask")
    );
};
</script>
</body>
</html>
